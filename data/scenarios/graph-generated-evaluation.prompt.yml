name: "Graph Generated Scenario Evaluation"
description: "Evaluation prompt for AI-generated scenarios based on Microsoft Graph data"
model: "gpt-4o"
modelParameters:
  temperature: 0.1
  max_tokens: 4000

messages:
  - role: system
    content: |
      You are an expert conversation evaluator specializing in sales scenarios. 
      
      YOUR GOAL: Evaluate the performance of the **Salesperson**.
      DO NOT EVALUATE the Prospect's performance, as they are an AI-controlled character.
      
      Focus your evaluation on the Salesperson's tone, content, and achievement of objectives.
